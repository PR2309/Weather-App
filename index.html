<body class="screen">
    <div class="intro">
        <img src="./media/logo1.png" alt="Weather App" />
        <h1>Weather App</h1>
    </div>
    <div class="card">
        <!-- <div class="lang">
            <select name="language" id="language" title="Languages" aria-label="Languages">
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
                <option value="Italic">Italic</option>
            </select>
        </div> -->
        <div class="search" aria-label="city-search">
            <input type="text" placeholder="Enter City Name" spellcheck="false" id="cityName" title="City Name" />
            <button aria-label="search" class="search-btn"><i class="bi bi-search"></i></button>
        </div>
        <div class="error">
            <img src="./media/default.png" height="400px" width="600px" class="default-weather-icon mb-2"
                alt="default-weath-icon" />
            <h1 title="City Name">Invalid city name</h1>
            <h3 title="Weather Data"><i>No data found</i></h3>
        </div>
        <div class="weather">
            <img src="./media/default.png" height="300px" width="420px" class="weather-icon mb-2" alt="weather-icon"
                draggable="false" />
            <h1 class="climate" title="Weather">Weather</h1>
            <h2>
                <span class="city" title="City Name">City Name</span>
                <sup><small class="country" title="Country Code">⚑</small></sup>
            </h2>
            <!-- <h2 class="city">City Name</h2>&NoBreak;<span><sup>⚑</sup></span> -->
            <div class="content">
                <div class="details d-flex">
                    <div class="">
                        <img width="80" height="80" class="imgs" src="./media/Icons/humidity-icon.png"
                            alt="🌢Humidity" />
                        <div style="margin-top: 0.5rem;" title="Humidity Percentage">
                            <p class="humidity customText">🌢%</p>
                            <p>Humidity</p>
                        </div>
                    </div>
                    <div class="">
                        <img width="80" height="80" class="imgs" src="./media/Icons/temperature-icon.png"
                            alt="🌡Temperature" />
                        <div class="paramValue" title="Temperature">
                            <p><span class="temperature customText">🌡</span>
                                <select name="°Degree" title="Temperature Unit" id="Degree"
                                    aria-label="Temperature Unit">
                                    <option value="standard">K</option>
                                    <option value="metric" selected>°C</option>
                                    <option value="imperial">°F</option>
                                </select>
                            </p>
                            <p>Temperature</p>
                        </div>
                    </div>
                    <div class="">
                        <img width="80" height="80" class="imgs" src="./media/Icons/day-and-night-icon.png"
                            alt="Shift" />
                        <div class="paramValue" title="Times of the Day">
                            <p class="day_and_night">Day</p>
                            <p>Hour Shifts</p>
                        </div>
                    </div>
                    <div class="">
                        <img width="80" height="80" class="imgs" src="./media/Icons/time-icon.png" alt="🕰Time" />
                        <div class="paramValue custom-select-wrapper" title="Time">
                            <p><span class="time">HH:MM</span>
                                <select name="timeFormat" title="Time Format" id="timeFormat" aria-label="Time Format">
                                    <option value="12" selected>12&nbsp;-&nbsp;hours</option>
                                    <option value="24">24&nbsp;-&nbsp;hours</option>
                                </select>
                            </p>
                            <p>Time</p>
                        </div>
                    </div>
                    <div class="col">
                        <img width="80" height="80" class="imgs" src="./media/Icons/wind-icon.png" alt="༄Wind Speed" />
                        <div class="paramValue" title="Wind Speed">
                            <p><span class="wind customText">༄</span>
                                <select name="speed" title="Wind Speed Unit" id="speedUnit"
                                    aria-label="Wind Speed Unit">
                                    <option value="kmph" selected>km/h</option>
                                    <option value="mph">m/h</option>
                                    <option value="mps">m/min</option>
                                    <option value="mpm">m/s</option>
                                </select>
                            </p>
                            <p>Wind Speed</p>
                        </div>
                    </div>
                    <!-- <div class="col">
                        <img width="80" height="80" class="imgs" src="./media/Icons/uv-icon.png" alt=""/>
                        <div style="margin-top: 0.5rem;">
                            <p class="UVindex">10 mW/m2</p>
                            <p>UV Index</p>
                        </div>
                    </div>
                    <div class="col">
                        <img width="80" height="80" class="imgs" src="./media/Icons/air-quality-icon.png" alt=""/>
                        <div style="margin-top: 0.5rem;">
                            <p class="airQuality">20</p>
                            <p>Air Quality</p>
                        </div>
                    </div> -->
                    <div class="col">
                        <img width="75" height="75" class="imgs" src="./media/Icons/pressure-gauge-icon.png"
                            alt="Atmospheric Pressure" />
                        <div class="paramValue" title="Atmospheric Pressure">
                            <p><span class="atmp">ATMP</span>
                                <select name="pressure" title="Pressure Unit" id="pressureUnit"
                                    aria-label="Pressure Unit">
                                    <option value="hPa" selected>hPa</option>
                                    <option value="mmHg">mmHg</option>
                                    <option value="atm">atm</option>
                                </select>
                            </p>
                            <p>Atomspheric<br />Pressure</p>
                        </div>
                    </div>
                </div>
            </div><br /><br />
        </div>
    </div>
    <div class="theme">

    </div>
